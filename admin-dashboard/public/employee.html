<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="CivicLens AI Field Officer Portal — Mobile task management for field workers"/>
  <title>CivicLens — Field Officer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --surface:  #21262d;
      --border:   rgba(48,54,61,0.9);
      --text:     #e6edf3;
      --muted:    #7d8590;
      --muted2:   #484f58;
      --success:  #3fb950;
      --warn:     #d29922;
      --danger:   #f85149;
      --purple:   #a371f7;
      --primary:  #1f6feb;
    }
    html, body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; }

    .topbar {
      position:sticky; top:0; z-index:50;
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:0 16px; height:54px;
      display:flex; align-items:center; gap:12px;
    }
    .topbar-logo { display:flex; align-items:center; gap:8px; }
    .logo-icon { width:28px; height:28px; border-radius:6px; background:linear-gradient(135deg,#1f6feb,#a371f7); display:flex; align-items:center; justify-content:center; }
    .logo-icon svg { width:14px; height:14px; fill:#fff; }
    .topbar-title { font-size:14px; font-weight:600; }
    .topbar-sub { font-size:11px; color:var(--muted); }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .btn-hq { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); text-decoration:none; font-weight:500; }

    .profile-card {
      margin:16px; padding:16px; border-radius:10px;
      background:var(--bg2); border:1px solid var(--border);
    }
    .profile-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; font-weight:600; }
    .officer-select {
      width:100%; background:var(--bg); border:1px solid var(--border);
      color:var(--text); padding:10px 12px; border-radius:8px;
      font-family:inherit; font-size:13px; outline:none;
    }
    .officer-select:focus { border-color:var(--primary); }

    .officer-badge {
      margin-top:12px;
      background:rgba(31,111,235,0.08); border:1px solid rgba(31,111,235,0.25);
      border-radius:8px; padding:10px 14px;
      display:flex; align-items:center; gap:12px;
    }
    .officer-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#1f6feb,#a371f7); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex-shrink:0; }
    .officer-info { flex:1; }
    .officer-name { font-size:14px; font-weight:600; }
    .officer-role { font-size:12px; color:var(--muted); }
    .officer-zone { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--primary); margin-top:2px; }

    .section { padding:0 16px 16px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .section-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .section-title svg { width:14px; height:14px; color:var(--muted); }
    .section-count { font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border); padding:2px 8px; border-radius:10px; }

    .task-card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; margin-bottom:12px;
    }
    .task-card.priority-high { border-left:3px solid var(--danger); }

    .task-snapshot { width:100%; height:180px; object-fit:cover; display:block; background:var(--bg); }
    .task-snap-placeholder { width:100%; height:120px; display:flex; align-items:center; justify-content:center; background:var(--bg); font-size:36px; color:var(--muted2); }

    .task-body { padding:14px; }
    .task-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
    .task-name { font-size:14px; font-weight:700; line-height:1.3; }
    .task-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; text-transform:uppercase; flex-shrink:0; }
    .task-badge.dispatched { background:rgba(163,113,247,0.12); color:var(--purple); border:1px solid rgba(163,113,247,0.25); }
    .task-badge.resolved { background:rgba(63,185,80,0.1); color:var(--success); border:1px solid rgba(63,185,80,0.25); }

    .task-meta { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
    .task-meta-item { font-size:11px; color:var(--muted); }

    .instructions-block {
      background:rgba(210,153,34,0.06); border:1px solid rgba(210,153,34,0.2);
      border-radius:6px; padding:10px 12px; margin-bottom:12px;
    }
    .instructions-title { font-size:10px; font-weight:700; color:var(--warn); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
    .instructions-text { font-size:12px; color:var(--text); line-height:1.6; }

    .resolve-form { border-top:1px solid var(--border); padding-top:12px; }
    .resolve-form-label { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    .resolve-ta {
      width:100%; background:var(--bg); border:1px solid var(--border);
      color:var(--text); padding:10px; border-radius:6px;
      font-family:inherit; font-size:13px; outline:none;
      resize:vertical; min-height:80px; margin-bottom:10px;
      transition: border-color .15s;
    }
    .resolve-ta:focus { border-color:var(--success); }
    .btn-resolve {
      width:100%; background:var(--success); border:none; color:#fff;
      padding:12px; border-radius:8px; font-size:13px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
      transition: opacity .15s, transform .1s;
    }
    .btn-resolve:hover:not(:disabled) { opacity:.9; }
    .btn-resolve:active:not(:disabled) { transform:scale(.99); }
    .btn-resolve:disabled { opacity:.5; cursor:not-allowed; }
    .btn-resolve svg { width:16px; height:16px; flex-shrink:0; }

    .archive-item {
      display:flex; gap:10px; align-items:center;
      background:var(--bg2); border:1px solid var(--border);
      border-radius:8px; padding:10px 12px; margin-bottom:8px;
    }
    .archive-thumb { width:48px; height:48px; border-radius:6px; object-fit:cover; background:var(--surface); flex-shrink:0; }
    .archive-thumb-emoji { width:48px; height:48px; border-radius:6px; background:var(--surface); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .archive-info { flex:1; min-width:0; }
    .archive-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .archive-note { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .archive-time { font-size:10px; color:var(--muted2); margin-top:2px; }

    .empty-block {
      background:var(--bg2); border:1px solid var(--border); border-radius:10px;
      padding:32px 20px; display:flex; flex-direction:column; align-items:center;
      gap:10px; text-align:center; color:var(--muted);
    }
    .empty-block svg { width:36px; height:36px; opacity:.4; }
    .empty-block h3 { font-size:13px; font-weight:600; color:var(--muted); }
    .empty-block p { font-size:12px; line-height:1.5; }

    #toasts { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; gap:8px; width:calc(100% - 32px); max-width:400px; }
    .toast { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; display:flex; gap:8px; align-items:flex-start; box-shadow:0 8px 24px rgba(0,0,0,.5); animation:tIn .3s ease; }
    @keyframes tIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .toast.danger { border-left:3px solid var(--danger); }
    .toast.success { border-left:3px solid var(--success); }
    .toast-icon { width:14px; height:14px; flex-shrink:0; margin-top:2px; }
    .toast.danger .toast-icon { color:var(--danger); }
    .toast.success .toast-icon { color:var(--success); }
    .toast-title { font-size:12px; font-weight:600; }
    .toast-msg { font-size:11px; color:var(--muted); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--muted2); border-radius:2px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></div>
    <div>
      <div class="topbar-title">Field Portal</div>
      <div class="topbar-sub">CivicLens AI</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="topClock" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);"></span>
    <a href="/" class="btn-hq">← HQ</a>
  </div>
</div>

<!-- PROFILE SELECTION -->
<div class="profile-card">
  <div class="profile-label">Officer Sign-In</div>
  <div id="loginForm">
    <input type="email" class="officer-select" id="loginEmail" placeholder="Email (e.g. arjun@civiclens.local)" style="margin-bottom:10px;">
    <input type="password" class="officer-select" id="loginPassword" placeholder="Password (e.g. password123)" style="margin-bottom:10px;">
    <button class="btn-hq" style="width:100%; background:var(--primary); color:#fff; border:none; padding:10px; font-size:13px; cursor:pointer;" onclick="signIn()">Log In</button>
  </div>
  <div class="officer-badge" id="officerBadge" style="display:none;">
    <div class="officer-avatar" id="badgeAvatar">--</div>
    <div class="officer-info">
      <div class="officer-name" id="badgeName">–</div>
      <div class="officer-role" id="badgeRole">–</div>
      <div class="officer-zone" id="badgeZone">–</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--success);">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;animation:blink 1.2s infinite;"></span>
      On Duty
    </div>
    <button class="btn-hq" style="margin-left:auto; padding:4px 8px; font-size:10px;" onclick="logOut()">Log Out</button>
  </div>
</div>

<style>@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}</style>

<div id="mainContent">
  <div class="section">
    <div class="empty-block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <h3>Sign In to Continue</h3>
      <p>Select your officer profile above to view assigned tasks and submit field reports.</p>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
  let officers = [], alerts = [], currentId = '';

  // ── Helpers ──
  function fmtTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false}) + ' ' +
           d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  }
  function fmtType(t) { return (t||'').replace(/_/g,' '); }
  function emoji(t) { return {'TRASH_ACCUMULATION':'🗑','ILLEGAL_PARKING':'🚗','POTHOLE_HAZARD':'⚠','RESTRICTED_ACCESS':'🚨'}[t]||'📷'; }
  function initials(n) { return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }

  // ── Toast ──
  function toast(type, title, msg) {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    const icons = {
      danger: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',
      success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
    };
    t.innerHTML = `${icons[type]||''}<div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>`;
    c.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  // ── Clock ──
  function updateClock() { document.getElementById('topClock').textContent = new Date().toLocaleTimeString('en-IN',{hour12:false}); }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Init ──
  async function init() {
    const cached = localStorage.getItem('clens_eid');
    if(cached) {
      // For mock purposes, if we have a cached ID we assume logged in.
      // We would normally fetch profile details here from a /api/me route
      // but for this demo we just show a logout button and empty badge until tasks load.
      currentId = cached;
      document.getElementById('loginForm').style.display = 'none';
      const badge = document.getElementById('officerBadge');
      badge.style.display = 'flex';
      refresh();
    }
  }

  // ── Sign In ──
  async function signIn() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    if(!email || !password) {
      toast('danger', 'Login Failed', 'Please enter both email and password.');
      return;
    }

    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();

      if(r.ok && d.ok && d.employee) {
        const o = d.employee;
        currentId = o.id;
        localStorage.setItem('clens_eid', o.id);
        
        document.getElementById('loginForm').style.display = 'none';
        
        const badge = document.getElementById('officerBadge');
        badge.style.display = 'flex';
        document.getElementById('badgeAvatar').textContent = initials(o.name);
        document.getElementById('badgeName').textContent = o.name;
        document.getElementById('badgeRole').textContent = o.role;
        document.getElementById('badgeZone').textContent = o.zone.replace('_', ' ');
        
        toast('success', 'Logged In', `Welcome back, ${o.name}`);
        refresh();
      } else {
        toast('danger', 'Login Failed', d.error || 'Invalid credentials');
      }
    } catch(e) {
      toast('danger', 'Network Error', 'Failed to connect to server.');
    }
  }

  function logOut() {
    currentId = '';
    localStorage.removeItem('clens_eid');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('officerBadge').style.display = 'none';
    document.getElementById('loginPassword').value = '';
    renderMain();
  }

  // ── Refresh (polls every 3s) ──
  async function refresh() {
    if(!currentId) { renderMain(); return; }
    const r = await fetch('/api/alerts?limit=60');
    const d = await r.json();
    alerts = d.alerts || [];
    renderMain();
  }

  // ── Render Main ──
  // KEY FIX: Before replacing innerHTML, we save the text currently typed
  // in each field report textarea (keyed by alert ID).
  // After rendering, we restore the saved text so typing is never lost.
  function renderMain() {
    const mc = document.getElementById('mainContent');

    if(!currentId) {
      mc.innerHTML = `<div class="section"><div class="empty-block">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <h3>Sign In to Continue</h3>
        <p>Select your officer profile above to view assigned tasks and submit field reports.</p>
      </div></div>`;
      return;
    }

    // ── STEP 1: Save any text already typed in report boxes ──
    const savedNotes = {};
    mc.querySelectorAll('textarea[id^="note_"]').forEach(ta => {
      if(ta.value.trim()) savedNotes[ta.id] = ta.value;
    });

    const active = alerts.filter(a => a.assignedEmployee?.id === currentId && a.status === 'dispatched');
    const done   = alerts.filter(a => a.assignedEmployee?.id === currentId && a.status === 'resolved');

    // ── STEP 2: Build HTML ──
    let html = `<div class="section">
      <div class="section-header">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Active Assignments
        </div>
        <span class="section-count">${active.length}</span>
      </div>`;

    if(!active.length) {
      html += `<div class="empty-block" style="padding:24px 20px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg>
        <h3>All Clear</h3>
        <p>No active tasks. You will be notified when a new task is dispatched to you.</p>
      </div>`;
    } else {
      html += active.map(a => {
        const thumb = a.snapshotUrl
          ? `<img class="task-snapshot" src="${a.snapshotUrl}" loading="lazy"/>`
          : `<div class="task-snap-placeholder">${emoji(a.eventType)}</div>`;
        return `<div class="task-card priority-high">
          ${thumb}
          <div class="task-body">
            <div class="task-top">
              <div class="task-name">${fmtType(a.eventType)}</div>
              <span class="task-badge dispatched">ACTIVE</span>
            </div>
            <div class="task-meta">
              <div class="task-meta-item">📍 ${a.zoneId.replace('_',' ')}</div>
              <div class="task-meta-item">⏱ ${fmtTime(a.timestamp)}</div>
              <div class="task-meta-item">🎯 ${(a.confidence*100).toFixed(0)}% confidence</div>
            </div>
            <div class="instructions-block">
              <div class="instructions-title">📋 HQ Dispatch Instructions</div>
              <div class="instructions-text">${a.instructions || '—'}</div>
            </div>
            <div class="resolve-form">
              <div class="resolve-form-label">📝 Field Report / Resolution Notes</div>
              <textarea class="resolve-ta" id="note_${a.id}"
                placeholder="Describe the actions you took to resolve this incident..."></textarea>
              <button class="btn-resolve" id="btn_${a.id}" onclick="resolve('${a.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Submit Work Report &amp; Close Task
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }
    html += '</div>';

    if(done.length) {
      html += `<div class="section">
        <div class="section-header">
          <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Completed Tasks
          </div>
          <span class="section-count">${done.length}</span>
        </div>`;
      html += done.slice(0, 10).map(a => {
        const thumb = a.snapshotUrl
          ? `<img class="archive-thumb" src="${a.snapshotUrl}"/>`
          : `<div class="archive-thumb-emoji">${emoji(a.eventType)}</div>`;
        return `<div class="archive-item">
          ${thumb}
          <div class="archive-info">
            <div class="archive-name">${fmtType(a.eventType)} — ${a.zoneId.replace('_',' ')}</div>
            <div class="archive-note">"${a.resolutionNotes || 'No notes'}"</div>
            <div class="archive-time">Resolved: ${fmtTime(a.resolvedAt || a.timestamp)}</div>
          </div>
          <span class="task-badge resolved" style="font-size:9px;padding:2px 6px;flex-shrink:0;">DONE</span>
        </div>`;
      }).join('');
      html += '</div>';
    }

    // ── STEP 3: Write to DOM ──
    mc.innerHTML = html;

    // ── STEP 4: Restore saved text into the new textareas ──
    Object.entries(savedNotes).forEach(([taId, val]) => {
      const ta = document.getElementById(taId);
      if(ta) ta.value = val;
    });
  }

  // ── Resolve / Submit Field Report ──
  async function resolve(id) {
    const ta = document.getElementById('note_' + id);
    const btn = document.getElementById('btn_' + id);
    const notes = ta?.value?.trim();

    if(!notes) {
      toast('danger', 'Report Required', 'Please write your field report before submitting.');
      ta?.focus();
      return;
    }

    // Disable button to prevent double-submit
    btn.disabled = true;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Submitting...`;

    try {
      const r = await fetch(`/api/alerts/${id}/resolve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resolutionNotes: notes })
      });

      if(r.ok) {
        toast('success', '✅ Task Completed', 'Your field report has been submitted successfully.');
        await refresh();
      } else {
        const err = await r.json().catch(() => ({}));
        toast('danger', 'Submission Failed', err.error || 'Server error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Submit Work Report &amp; Close Task`;
      }
    } catch(e) {
      toast('danger', 'Network Error', 'Could not reach server. Check your connection.');
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Submit Work Report &amp; Close Task`;
    }
  }

  // ── Boot ──
  init();
  setInterval(() => { if(currentId) refresh(); }, 3000);
</script>
</body>
</html>
